spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${JDBC_URL:}
    username: ${POSTGRESQL_USERNAME:}
    password: ${POSTGRESQL_PASSWORD:}
  data:
    mongodb:
      uri: ${MONGODB_URI:}
      field-naming-strategy: org.springframework.data.mapping.model.SnakeCaseFieldNamingStrategy

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${DDL_AUTO:}
    properties:
      hibernate:
        default_schema: beeve
        format_sql: true
        highlight_sql: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

jwt:
  secret-key: ${JWT_SECRET_KEY:}
  access-expiration: ${JWT_ACCESS_EXP:}
  refresh-expiration: ${JWT_REFRESH_EXP:}

logging:
  level:
    org.hibernate.SQL: DEBUG
    feign.Logger: DEBUG
    beeve.biz.recommend.rest: DEBUG

springdoc:
  swagger-ui:
    doc-expansion: none
    persist-authorization: true

feign:
  okhttp:
    enabled: true
  httpclient:
    enabled: false
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 10000
        loggerLevel: DEBUG


google:
  ai:
    api-key: ${GEMINI_API_KEY:}
